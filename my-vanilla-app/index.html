<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="src/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>my-vanilla-app</title>
  </head>
  <body>
    <div class="container py-5 bg-grey">
        <div class="text-center mb-5">
            <h1 class="display-4">RSS агрегатор</h1>
            <p class="lead"></p>
        </div>
        <div class="row justify-content-center">
            <div class="col-md-8">
                <form id="rssForm" class="mb-4">
                    <label for="rssUrl" class="form-label">Ссылка RSS</label>
                    <input type="url"
                    class="form-control"
                    id="rssUrl"
                    name="url"
                    required>
                    <button type="submit" class="btn btn-primary w-100">Добавить</button>
                    <div class="invalid-feedback" id="url-feedback"></div>
                    <small class="form-text" text-muted>Пример: https://loren-rss.hexlet.app/feed</small>
                </form>
            </div>
        </div>
    </div>
    <script type="module" src='src/main.js'></script>
  </body>
</html>
